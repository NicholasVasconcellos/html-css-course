<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* body > * {
        padding-top: 24px;
      } */

      body {
        font-family: sans-serif;
        font-size: 24px;
        /* Grid Continer */
        display: grid;
        grid-template-columns: 80px 400px 1fr 250px;
        grid-template-rows: 80px 1fr;
        height: 100vh;

        text-align: center;
        font-weight: bold;
      }

      nav {
        background-color: #343a40;
        /* Spns ll the rows. -1 = end */
        grid-row: 1 / -1;
        color: white;
      }

      menu {
        background-color: #7950f2;
        /* Spn second till lst column */

        grid-column: 2 / -1;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 0px 12px;
      }

      menu > button {
        display: inline-block;
        font-size: 16px;
        background-color: #5f3dc4;
        color: white;
        box-shadow: none;
        border: none;
        cursor: pointer;
        padding: 8px 12px;
        font-weight: bold;
      }

      menu > button:last-child {
        background-color: #f76707;
        margin-left: auto;
      }

      menu > button:hover {
        background-color: #e5dbff;
        color: #5f3dc4;
      }

      aside,
      section {
        background-color: #e9ecef;
      }

      .inbox {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 24px 0;
        overflow: auto;
        /* max-height: 80vh; */
      }

      .email {
        display: flex;
        background-color: #adb5bd;
        height: 96px;
        align-items: center;
        justify-content: center;

        flex-shrink: 0;
      }

      .email:hover {
        background-color: #343a40;
        color: white;
      }

      /* Grid with 2 rows,  3 cols */
      /* keep the emil size the same, change the width of eail view and other */
    </style>
  </head>
  <body>
    <nav>nv Here</nav>
    <menu>
      <button>New</button>
      <button>Reply</button>
      <button>Forward</button>
      <button>Mark Unred</button>
      <button>X</button>
      <button>Y</button>
      <button>Trash</button>
    </menu>
    <section class="inbox">
      <div class="email">Email 1</div>
      <div class="email">Email 2</div>
      <div class="email">Email 3</div>
      <div class="email">Email 4</div>
      <div class="email">Email 5</div>
      <div class="email">Email 6</div>
      <div class="email">Email 7</div>
      <div class="email">Email 8</div>
      <div class="email">Email 9</div>
      <div class="email">Email 10</div>
    </section>
    <main>Email View</main>
    <aside>Additional Info</aside>
  </body>
</html>
